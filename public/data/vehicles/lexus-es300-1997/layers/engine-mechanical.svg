<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="metalGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B8B8B"/>
      <stop offset="50%" stop-color="#6B6B6B"/>
      <stop offset="100%" stop-color="#4B4B4B"/>
    </linearGradient>
    <linearGradient id="aluminumGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A8A8A8"/>
      <stop offset="100%" stop-color="#787878"/>
    </linearGradient>
  </defs>

  <!-- 1MZ-FE V6 Engine - positioned in engine bay area -->
  <g transform="translate(220, 320)" data-component-id="1mzfe-engine">

    <!-- Engine block -->
    <rect
      x="0" y="40" width="180" height="100" rx="5"
      fill="url(#aluminumGradient)"
      stroke="#555"
      stroke-width="1.5"
      data-component-id="engine-block"
    />

    <!-- Oil pan -->
    <rect
      x="10" y="140" width="160" height="25" rx="3"
      fill="#4a4a4a"
      stroke="#333"
      stroke-width="1"
      data-component-id="oil-pan"
    />

    <!-- Cylinder head - front bank -->
    <path
      d="M 5 40 L 175 40 L 170 10 Q 160 0, 90 0 Q 20 0, 10 10 Z"
      fill="url(#aluminumGradient)"
      stroke="#555"
      stroke-width="1"
      data-component-id="cylinder-head-front"
    />

    <!-- Valve cover - front bank -->
    <rect
      x="15" y="-5" width="150" height="15" rx="3"
      fill="#2a2a2a"
      stroke="#1a1a1a"
      stroke-width="1"
      data-component-id="valve-cover-front"
    />

    <!-- Intake manifold -->
    <path
      d="M 60 -10 Q 90 -40, 120 -10"
      fill="none"
      stroke="#777"
      stroke-width="20"
      stroke-linecap="round"
      data-component-id="intake-manifold"
    />

    <!-- Throttle body -->
    <circle
      cx="90" cy="-35" r="18"
      fill="#666"
      stroke="#444"
      stroke-width="2"
      data-component-id="throttle-body"
    />

    <!-- Air intake -->
    <path
      d="M 90 -53 Q 70 -70, 40 -60 L 20 -50"
      fill="none"
      stroke="#444"
      stroke-width="12"
      stroke-linecap="round"
      data-component-id="air-intake"
    />

    <!-- Alternator -->
    <circle
      cx="-20" cy="80" r="25"
      fill="url(#metalGradient)"
      stroke="#444"
      stroke-width="1.5"
      data-component-id="alternator"
    />
    <circle cx="-20" cy="80" r="8" fill="#333"/>

    <!-- Serpentine belt path hint -->
    <path
      d="M -20 105 Q 0 140, 30 150 Q 80 160, 120 140"
      fill="none"
      stroke="#222"
      stroke-width="3"
      stroke-dasharray="5,3"
    />

    <!-- Water pump -->
    <circle
      cx="200" cy="70" r="20"
      fill="url(#metalGradient)"
      stroke="#444"
      stroke-width="1.5"
      data-component-id="water-pump"
    />

    <!-- Timing belt cover -->
    <rect
      x="180" y="20" width="25" height="100" rx="3"
      fill="#3a3a3a"
      stroke="#222"
      stroke-width="1"
      data-component-id="timing-belt-cover"
    />

    <!-- Starter motor -->
    <ellipse
      cx="160" cy="155" rx="30" ry="15"
      fill="url(#metalGradient)"
      stroke="#444"
      stroke-width="1"
      data-component-id="starter-motor"
    />

    <!-- Exhaust manifold hint -->
    <path
      d="M 185 60 Q 220 80, 240 120 Q 250 150, 260 180"
      fill="none"
      stroke="#8B4513"
      stroke-width="8"
      stroke-linecap="round"
      data-component-id="exhaust-manifold"
    />

    <!-- Crankshaft pulley -->
    <circle
      cx="200" cy="120" r="22"
      fill="#555"
      stroke="#333"
      stroke-width="2"
      data-component-id="crankshaft-pulley"
    />
    <circle cx="200" cy="120" r="10" fill="#333"/>

    <!-- Engine mount -->
    <rect
      x="-30" y="30" width="20" height="35" rx="2"
      fill="#2a2a2a"
      stroke="#1a1a1a"
      stroke-width="1"
      data-component-id="engine-mount-lh"
    />

  </g>

  <!-- Engine label -->
  <text x="310" y="520" font-family="Inter, sans-serif" font-size="11" fill="#666" font-weight="500">
    1MZ-FE 3.0L V6
  </text>
</svg>
