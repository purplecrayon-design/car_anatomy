<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <!-- Wiring Harnesses Layer -->
  <g fill="none" stroke="#3498DB" stroke-width="2" stroke-opacity="0.6">

    <!-- Main engine harness -->
    <path data-component-id="engine-harness" d="M 290 380 Q 400 350 500 380 Q 550 400 600 380"
          stroke-width="4" style="cursor: pointer">
      <title>Engine Wiring Harness</title>
    </path>

    <!-- ECU -->
    <rect data-component-id="ecu" x="580" y="360" width="40" height="30" rx="4"
          fill="#3498DB" fill-opacity="0.3" style="cursor: pointer">
      <title>Engine Control Unit (ECU)</title>
    </rect>

    <!-- Battery cables -->
    <path data-component-id="battery-cables" d="M 150 440 L 200 440 L 220 450"
          stroke-width="6" stroke="#3498DB" style="cursor: pointer">
      <title>Battery Cables</title>
    </path>

    <!-- Fuse box connection -->
    <rect data-component-id="fuse-box" x="450" y="320" width="30" height="25" rx="2"
          fill="#3498DB" fill-opacity="0.3" style="cursor: pointer">
      <title>Fuse Box</title>
    </rect>

    <!-- Body harness -->
    <path data-component-id="body-harness" d="M 500 380 L 700 380 L 900 400"
          stroke-width="3" stroke-dasharray="8,4" style="cursor: pointer">
      <title>Body Wiring Harness</title>
    </path>

    <!-- Ground points -->
    <circle data-component-id="ground-g1" cx="300" cy="480" r="8"
            fill="#3498DB" fill-opacity="0.5" style="cursor: pointer">
      <title>Ground Point G1</title>
    </circle>

    <circle data-component-id="ground-g2" cx="800" cy="480" r="8"
            fill="#3498DB" fill-opacity="0.5" style="cursor: pointer">
      <title>Ground Point G2</title>
    </circle>

  </g>
</svg>
