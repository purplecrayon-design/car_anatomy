<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <!-- Cooling System Layer -->
  <g fill="#1ABC9C" fill-opacity="0.3" stroke="#1ABC9C" stroke-width="1.5">

    <!-- Radiator -->
    <rect data-component-id="radiator" x="130" y="350" width="20" height="120" rx="4"
          style="cursor: pointer">
      <title>Radiator</title>
    </rect>

    <!-- Radiator hoses -->
    <path data-component-id="upper-hose" d="M 150 370 Q 170 360 200 380"
          fill="none" stroke-width="8" style="cursor: pointer">
      <title>Upper Radiator Hose</title>
    </path>

    <path data-component-id="lower-hose" d="M 150 450 Q 170 470 200 470"
          fill="none" stroke-width="8" style="cursor: pointer">
      <title>Lower Radiator Hose</title>
    </path>

    <!-- Thermostat housing -->
    <circle data-component-id="thermostat" cx="210" cy="380" r="12"
            style="cursor: pointer">
      <title>Thermostat</title>
    </circle>

    <!-- Coolant reservoir -->
    <rect data-component-id="coolant-reservoir" x="400" y="300" width="25" height="40" rx="4"
          style="cursor: pointer">
      <title>Coolant Reservoir</title>
    </rect>

    <!-- Heater core lines -->
    <path data-component-id="heater-hoses" d="M 300 400 Q 450 380 500 350"
          fill="none" stroke-width="4" stroke-dasharray="6,3" style="cursor: pointer">
      <title>Heater Hoses</title>
    </path>

    <!-- Cooling fan -->
    <circle data-component-id="cooling-fan" cx="140" cy="410" r="30"
            fill="none" stroke-width="2" style="cursor: pointer">
      <title>Cooling Fan</title>
    </circle>

  </g>
</svg>
