<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <!-- Body Electrical Layer -->
  <g fill="#E67E22" fill-opacity="0.3" stroke="#E67E22" stroke-width="1.5">

    <!-- Headlight left -->
    <ellipse data-component-id="headlight-left" cx="170" cy="420" rx="25" ry="18"
             style="cursor: pointer">
      <title>Left Headlight</title>
    </ellipse>

    <!-- Taillight left -->
    <rect data-component-id="taillight-left" x="1020" y="400" width="18" height="35" rx="3"
          style="cursor: pointer">
      <title>Left Taillight</title>
    </rect>

    <!-- Battery -->
    <rect data-component-id="battery" x="130" y="380" width="45" height="35" rx="4"
          style="cursor: pointer">
      <title>Battery</title>
    </rect>

    <!-- Instrument cluster -->
    <rect data-component-id="instrument-cluster" x="480" y="260" width="60" height="25" rx="4"
          style="cursor: pointer">
      <title>Instrument Cluster</title>
    </rect>

    <!-- Ignition switch -->
    <circle data-component-id="ignition-switch" cx="550" cy="300" r="10"
            style="cursor: pointer">
      <title>Ignition Switch</title>
    </circle>

    <!-- Door switch left -->
    <circle data-component-id="door-switch-left" cx="500" cy="400" r="6"
            style="cursor: pointer">
      <title>Left Door Switch</title>
    </circle>

    <!-- Door switch right -->
    <circle data-component-id="door-switch-right" cx="700" cy="400" r="6"
            style="cursor: pointer">
      <title>Right Door Switch</title>
    </circle>

    <!-- Horn -->
    <circle data-component-id="horn" cx="200" cy="450" r="12"
            style="cursor: pointer">
      <title>Horn</title>
    </circle>

    <!-- Wiper motor -->
    <ellipse data-component-id="wiper-motor" cx="450" cy="290" rx="15" ry="10"
             style="cursor: pointer">
      <title>Wiper Motor</title>
    </ellipse>

    <!-- Power window motor -->
    <rect data-component-id="power-window-motor" x="520" y="420" width="20" height="15" rx="2"
          style="cursor: pointer">
      <title>Power Window Motor</title>
    </rect>

    <!-- Blower motor -->
    <circle data-component-id="blower-motor" cx="550" cy="380" r="15"
            style="cursor: pointer">
      <title>Blower Motor</title>
    </circle>

    <!-- Radio/stereo -->
    <rect data-component-id="radio" x="560" y="330" width="40" height="25" rx="3"
          style="cursor: pointer">
      <title>Radio/Stereo</title>
    </rect>

  </g>
</svg>
